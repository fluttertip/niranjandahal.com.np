<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niranjan Dahal — Developer Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES / THEMES ===== */
:root,[data-theme="light"]{
  --bg:#f8f9fa;--surface:#fff;--surface2:#f1f3f4;--surface3:#e8eaed;
  --text:#202124;--text2:#5f6368;--text3:#80868b;--text-inv:#fff;
  --border:#e8eaed;--border2:#dadce0;
  --green:#01875f;--green-bg:#e6f4f0;--green-light:#34a853;
  --blue:#1a73e8;--blue-bg:#e8f0fe;
  --red:#d93025;--yellow:#f9ab00;
  --topbar-bg:#fff;--topbar-border:#e8eaed;
  --chip-bg:#e8eaed;--chip-text:#202124;
  --card-shadow:0 1px 2px rgba(60,64,67,.15),0 2px 6px rgba(60,64,67,.1);
  --card-shadow-hover:0 2px 8px rgba(60,64,67,.2),0 4px 16px rgba(60,64,67,.12);
  --scrollbar:#dadce0;
  --overlay-bg:rgba(0,0,0,.5);
  --skeleton-from:#e8eaed;--skeleton-to:#f5f5f5;
  --hero-overlay:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.3) 50%,transparent 100%);
  --tab-active-color:#1a73e8;--tab-indicator:#1a73e8;
}
[data-theme="dark"]{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#282828;--surface3:#323232;
  --text:#e8eaed;--text2:#9aa0a6;--text3:#5f6368;--text-inv:#202124;
  --border:#3c4043;--border2:#5f6368;
  --green:#34a853;--green-bg:#1a2e22;--green-light:#34a853;
  --blue:#8ab4f8;--blue-bg:#1a2232;
  --red:#f28b82;--yellow:#fdd663;
  --topbar-bg:#1a1a1a;--topbar-border:#3c4043;
  --chip-bg:#3c4043;--chip-text:#e8eaed;
  --card-shadow:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.3);
  --card-shadow-hover:0 4px 12px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);
  --scrollbar:#3c4043;
  --overlay-bg:rgba(0,0,0,.75);
  --skeleton-from:#282828;--skeleton-to:#323232;
  --hero-overlay:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 50%,transparent 100%);
  --tab-active-color:#8ab4f8;--tab-indicator:#8ab4f8;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:14px}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input{font-family:inherit}
img{display:block}

/* ===== TOPBAR ===== */
.topbar{
  position:sticky;top:0;z-index:200;
  background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);
  height:64px;display:flex;align-items:center;gap:16px;padding:0 16px;
  transition:background .3s,border-color .3s;
}
.topbar-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;padding:0 8px}
.logo-icon{display:flex;align-items:center;gap:2px}
.logo-icon span{font-size:22px;font-weight:700;line-height:1}
.logo-icon .g{color:#4285f4}.logo-icon .o1{color:#ea4335}.logo-icon .o2{color:#fbbc04}.logo-icon .g2{color:#4285f4}.logo-icon .l{color:#34a853}.logo-icon .e{color:#ea4335}
.logo-play{font-family:'Google Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text2);margin-left:2px}
.topbar-nav{display:flex;gap:4px;flex-shrink:0}
.topbar-nav-btn{padding:6px 14px;border-radius:100px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;background:none;border:none}
.topbar-nav-btn:hover{background:var(--surface2)}
.topbar-nav-btn.active{background:var(--blue-bg);color:var(--blue)}
.topbar-search{flex:1;max-width:720px;margin:0 auto}
.search-bar{
  display:flex;align-items:center;gap:12px;
  background:var(--surface2);border:1px solid transparent;border-radius:24px;
  padding:0 16px;height:46px;cursor:text;transition:all .2s;
}
.search-bar:focus-within{background:var(--surface);border-color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.search-bar input{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);outline:none}
.search-bar input::placeholder{color:var(--text3)}
.search-icon-btn{color:var(--text2);display:flex;align-items:center;padding:4px}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:background .15s;border:none;background:none}
.icon-btn:hover{background:var(--surface2)}
.icon-btn svg{width:22px;height:22px}
.theme-toggle{width:40px;height:40px}
.avatar-btn{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#01875f,#34a853);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:12px;cursor:pointer;border:2px solid var(--border2);flex-shrink:0}

/* ===== CATEGORY TABS ===== */
.cat-bar{
  background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);
  position:sticky;top:64px;z-index:190;
  display:flex;overflow-x:auto;scrollbar-width:none;
  transition:background .3s;
}
.cat-bar::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:0 20px;height:48px;
  display:flex;align-items:center;
  font-size:13px;font-weight:500;color:var(--text2);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;border-top:none;border-left:none;border-right:none;background:none;
}
.cat-tab:hover{color:var(--text);background:var(--surface2)}
.cat-tab.active{color:var(--tab-active-color);border-bottom-color:var(--tab-indicator);font-weight:500}

/* ===== MAIN LAYOUT ===== */
.main-wrap{display:flex;max-width:1400px;margin:0 auto}
.sidebar{width:240px;flex-shrink:0;padding:24px 16px;position:sticky;top:113px;height:calc(100vh - 113px);overflow-y:auto;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sidebar-section{margin-bottom:8px}
.sidebar-label{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:12px 12px 6px}
.sidebar-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:100px;
  font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;
}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--blue-bg);color:var(--blue)}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:8px 0}

/* ===== CONTENT ===== */
.content{flex:1;min-width:0;padding:0 0 80px}

/* ===== HERO BANNER ===== */
.hero-banner{padding:16px 24px 0;overflow:hidden}
.hero-track-wrap{position:relative;overflow:hidden;border-radius:16px}
.hero-track{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.hero-slide{
  min-width:100%;height:260px;position:relative;cursor:pointer;flex-shrink:0;overflow:hidden;border-radius:16px;
  background:var(--surface3);
}
.hero-slide-bg{width:100%;height:100%;object-fit:cover;background:linear-gradient(135deg,#1a2e22,#0f3460)}
.hero-slide-overlay{position:absolute;inset:0;background:var(--hero-overlay)}
.hero-slide-badge{
  position:absolute;top:16px;left:16px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:11px;font-weight:500;padding:4px 12px;border-radius:100px;
  display:flex;align-items:center;gap:6px;
}
.update-dot{width:6px;height:6px;border-radius:50%;background:#34a853;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-slide-content{position:absolute;bottom:0;left:0;right:0;padding:20px 24px}
.hero-app-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.hero-app-icon{
  width:56px;height:56px;border-radius:12px;overflow:hidden;
  background:var(--surface);border:1px solid rgba(255,255,255,.15);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.hero-app-info{}
.hero-app-name{font-family:'Google Sans Display',sans-serif;font-size:20px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:2px}
.hero-app-dev{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:4px}
.hero-app-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:rgba(255,255,255,.85)}
.hero-actions{display:flex;gap:10px;align-items:center}
.hero-install-btn{
  background:#fff;color:var(--text);
  border:none;border-radius:100px;padding:8px 22px;font-size:13px;font-weight:500;cursor:pointer;
  transition:all .2s;font-family:'Google Sans',sans-serif;
}
.hero-install-btn:hover{transform:scale(1.02)}
.hero-install-btn.green{background:var(--green);color:#fff}
.hero-wish-btn{
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:100px;
  padding:8px 16px;font-size:13px;cursor:pointer;transition:all .15s;
}
.hero-indicators{position:absolute;bottom:16px;right:20px;display:flex;gap:5px;z-index:2}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:all .25s}
.hero-dot.active{background:#fff;width:20px;border-radius:3px}
.hero-prev,.hero-next{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2;
  opacity:0;line-height:1;
}
.hero-track-wrap:hover .hero-prev,.hero-track-wrap:hover .hero-next{opacity:1}
.hero-prev{left:12px}.hero-next{right:12px}
.hero-prev:hover,.hero-next:hover{background:rgba(255,255,255,.22)}

/* ===== SECTION ===== */
.section{padding:24px 24px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Google Sans',sans-serif;font-size:17px;font-weight:500;color:var(--text)}
.see-more-btn{font-size:13px;font-weight:500;color:var(--blue);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px}
.see-more-btn:hover{background:var(--blue-bg)}

/* ===== TOP CHARTS ===== */
.charts-tabs{display:flex;gap:0;background:var(--surface2);border-radius:100px;padding:2px;margin-bottom:18px;width:fit-content}
.chart-tab{padding:6px 18px;border-radius:100px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border:none;background:none}
.chart-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--card-shadow)}

/* Chart list */
.chart-list{display:flex;flex-direction:column;gap:0}
.chart-row{
  display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:background .15s;
}
.chart-row:hover{background:var(--surface2)}
.chart-rank{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;color:var(--text2);width:20px;text-align:center;flex-shrink:0}
.chart-icon{width:56px;height:56px;border-radius:12px;overflow:hidden;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px}
.chart-icon img{width:100%;height:100%;object-fit:cover}
.chart-info{flex:1;min-width:0}
.chart-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-cat{font-size:12px;color:var(--text2)}
.chart-rating{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px;margin-top:2px}
.chart-rating .star{color:var(--yellow);font-size:11px}
.chart-btn{
  padding:7px 18px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;
  background:var(--green-bg);color:var(--green);border:none;transition:all .15s;white-space:nowrap;
}
.chart-btn:hover{background:var(--green);color:#fff}
.chart-btn.price{background:var(--chip-bg);color:var(--text2)}
.chart-btn.price:hover{background:var(--surface3)}

/* Chart grid (3 cols) */
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.chart-grid-col{border-right:1px solid var(--border)}
.chart-grid-col:last-child{border-right:none}
.chart-grid-col-header{font-size:12px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:8px 14px 6px}

/* ===== HORIZONTAL SCROLL ROW ===== */
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;scroll-snap-type:x mandatory}
.h-scroll::-webkit-scrollbar{display:none}

/* App card square (icon + name) */
.app-sq{min-width:84px;max-width:84px;cursor:pointer;scroll-snap-align:start;transition:transform .2s}
.app-sq:hover{transform:scale(1.04)}
.app-sq-icon{width:84px;height:84px;border-radius:18px;overflow:hidden;background:var(--surface3);margin-bottom:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:38px;border:1px solid var(--border)}
.app-sq-icon img{width:100%;height:100%;object-fit:cover}
.app-sq-name{font-size:12px;color:var(--text2);text-align:center;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-sq-rating{font-size:11px;color:var(--text3);text-align:center;display:flex;align-items:center;justify-content:center;gap:2px;margin-top:2px}
.app-sq-rating .star{color:var(--yellow);font-size:10px}

/* App card wide */
.app-wide{min-width:220px;background:var(--surface);border-radius:12px;overflow:hidden;cursor:pointer;scroll-snap-align:start;transition:all .2s;border:1px solid var(--border)}
.app-wide:hover{box-shadow:var(--card-shadow-hover);transform:translateY(-1px)}
.app-wide-img{width:100%;height:120px;object-fit:cover;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:48px}
.app-wide-body{padding:10px 12px}
.app-wide-row{display:flex;align-items:center;gap:10px}
.app-wide-icon{width:40px;height:40px;border-radius:9px;overflow:hidden;background:var(--surface3);flex-shrink:0;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px}
.app-wide-info .name{font-size:13px;font-weight:500;color:var(--text)}
.app-wide-info .sub{font-size:11px;color:var(--text2);margin-top:1px}
.app-wide-info .rating{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:2px;margin-top:2px}
.app-wide-info .rating .star{color:var(--yellow);font-size:10px}

/* Promo wide card (like hero sub-cards) */
.promo-card{min-width:300px;border-radius:12px;overflow:hidden;cursor:pointer;scroll-snap-align:start;background:var(--surface3);position:relative;height:180px;border:1px solid var(--border);transition:all .2s}
.promo-card:hover{box-shadow:var(--card-shadow-hover);transform:translateY(-1px)}
.promo-card-bg{width:100%;height:100%;object-fit:cover;display:flex;align-items:center;justify-content:center;font-size:60px;background:linear-gradient(135deg,#1a2e22,#0f3460)}
.promo-card-overlay{position:absolute;inset:0;background:var(--hero-overlay)}
.promo-card-content{position:absolute;bottom:0;left:0;right:0;padding:16px}
.promo-card-badge{font-size:10px;color:rgba(255,255,255,.8);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.promo-card-name{font-family:'Google Sans',sans-serif;font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.promo-card-sub{font-size:12px;color:rgba(255,255,255,.75)}
.promo-card-btn{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.25);color:#fff;
  border-radius:100px;padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;
}

/* ===== CHIPS ===== */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;background:var(--chip-bg);color:var(--chip-text)}
.chip.flutter{background:#e3f2fd;color:#1565c0}
.chip.ai{background:#fce4ec;color:#880e4f}
.chip.firebase{background:#fff3e0;color:#bf360c}
.chip.backend{background:#e8f5e9;color:#1b5e20}
.chip.research{background:#f3e5f5;color:#4a148c}
.chip.game{background:#e8eaf6;color:#1a237e}
[data-theme="dark"] .chip.flutter{background:#1a2a3a;color:#82b1ff}
[data-theme="dark"] .chip.ai{background:#2a1a2a;color:#f48fb1}
[data-theme="dark"] .chip.firebase{background:#2a1a0a;color:#ffcc80}
[data-theme="dark"] .chip.backend{background:#0a1a0a;color:#a5d6a7}
[data-theme="dark"] .chip.research{background:#1a0a2a;color:#ce93d8}
[data-theme="dark"] .chip.game{background:#0a0a2a;color:#9fa8da}

/* ===== DETAIL PAGE ===== */
.detail-page{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;overflow-y:auto;transition:background .3s}
.detail-page.open{display:block}
.detail-topbar{
  position:sticky;top:0;background:var(--topbar-bg);border-bottom:1px solid var(--topbar-border);
  height:56px;display:flex;align-items:center;gap:12px;padding:0 16px;z-index:10;
  backdrop-filter:blur(8px);
}
.back-btn{width:36px;height:36px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:24px;transition:background .15s}
.back-btn:hover{background:var(--surface2)}
.detail-content{max-width:900px;margin:0 auto;padding:24px 24px 120px}

/* App header */
.app-header{display:flex;gap:20px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap}
.app-header-icon{width:96px;height:96px;border-radius:22px;overflow:hidden;flex-shrink:0;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:48px}
.app-header-icon img{width:100%;height:100%;object-fit:cover}
.app-header-info{flex:1;min-width:200px}
.app-header-name{font-family:'Google Sans Display',sans-serif;font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:3px}
.app-header-dev{font-size:14px;color:var(--green);font-weight:500;cursor:pointer;margin-bottom:3px}
.app-header-dev:hover{text-decoration:underline}
.app-header-cat{font-size:13px;color:var(--text2);margin-bottom:12px}
.app-header-actions{display:flex;gap:10px;flex-wrap:wrap}
.install-btn{
  background:var(--green);color:#fff;border:none;border-radius:100px;
  padding:11px 32px;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;
  font-family:'Google Sans',sans-serif;
}
.install-btn:hover{background:#016e4f;transform:scale(1.02)}
.install-btn.outline{background:transparent;color:var(--green);border:2px solid var(--green)}
.install-btn.outline:hover{background:var(--green-bg)}
.wishlist-btn{
  width:46px;height:46px;border-radius:50%;border:2px solid var(--border2);background:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);
  transition:all .15s;
}
.wishlist-btn:hover{background:var(--surface2);border-color:var(--text2)}

/* Ratings bar */
.ratings-bar{display:flex;gap:0;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin:20px 0;background:var(--surface)}
.rating-section{flex:1;padding:16px 20px;text-align:center;border-right:1px solid var(--border)}
.rating-section:last-child{border-right:none}
.rating-big{font-family:'Google Sans',sans-serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px}
.rating-stars-row{display:flex;justify-content:center;gap:2px;margin:4px 0}
.rating-star{color:var(--yellow);font-size:14px}
.rating-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

/* Screenshots */
.screenshots-wrap{margin:24px 0}
.screenshots-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.screenshots-scroll::-webkit-scrollbar{display:none}
.screenshot{min-width:140px;height:250px;border-radius:12px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:40px}
.screenshot img{width:100%;height:100%;object-fit:cover}

/* About section */
.about-section{border:1px solid var(--border);border-radius:16px;overflow:hidden;margin:20px 0;background:var(--surface)}
.about-section-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.about-section-header:hover{background:var(--surface2)}
.about-section-title{font-family:'Google Sans',sans-serif;font-size:15px;font-weight:500;color:var(--text)}
.about-body{padding:0 20px 20px;font-size:14px;color:var(--text2);line-height:1.7}
.about-features{padding:0 20px 16px}
.feature-item{display:flex;align-items:flex-start;gap:10px;padding:6px 0;font-size:14px;color:var(--text2)}
.feature-dot{width:6px;height:6px;border-radius:50%;background:var(--green);margin-top:7px;flex-shrink:0}

/* Tags row */
.tags-row{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px}

/* What's new */
.whats-new{padding:0 20px 20px;font-size:13px;color:var(--text2);line-height:1.6}
.version-label{font-size:11px;color:var(--text3);margin-bottom:6px}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));border-top:1px solid var(--border)}
.info-cell{padding:16px 20px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.info-cell:nth-last-child(-n+3){border-bottom:none}
.info-cell-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.info-cell-val{font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text)}

/* Sticky CTA */
.sticky-cta{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:rgba(255,255,255,.92);border-top:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(12px);display:none;
}
[data-theme="dark"] .sticky-cta{background:rgba(26,26,26,.92)}
.sticky-cta.visible{display:flex}
.sticky-cta-app{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.sticky-cta-icon{width:40px;height:40px;border-radius:9px;overflow:hidden;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.sticky-cta-name{font-weight:500;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== SEARCH OVERLAY ===== */
#searchOverlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;transition:background .3s}
#searchOverlay.open{display:block}
.search-overlay-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.search-overlay-input{flex:1;height:46px;background:var(--surface2);border:1.5px solid transparent;border-radius:24px;padding:0 20px;font-size:15px;color:var(--text);outline:none;transition:all .2s}
.search-overlay-input:focus{background:var(--surface);border-color:var(--blue)}
.search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:24px}
.no-results{text-align:center;padding:80px 20px;color:var(--text2)}
.no-results-icon{font-size:48px;margin-bottom:16px}
.no-results p{font-size:16px}
.no-results span{font-size:13px;color:var(--text3);display:block;margin-top:6px}

/* ===== ANIMATIONS ===== */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{from{background-position:-400px 0}to{background-position:400px 0}}
.fade-in{animation:fadeSlideUp .3s ease both}

/* ===== RESPONSIVE ===== */
@media(max-width:960px){.sidebar{display:none}}
@media(max-width:600px){
  .topbar{height:56px;padding:0 12px;gap:10px}

  .ratings-bar{flex-direction:column}
  .rating-section{border-right:none;border-bottom:1px solid var(--border)}
}

const heroColors = [

let heroIdx=0,heroTimer;

heroProjects.forEach((p,i)=>{
  const slide=document.createElement('div');
  slide.className='hero-slide';

  slide.onclick=()=>openDetail(p.id);
  slide.innerHTML=`
    <div class="hero-slide-overlay"></div>
    <div class="hero-slide-badge"><span class="update-dot"></span> Update available</div>

          <div class="hero-app-dev">${p.dev} · ${p.cat}</div>

        </div>

      </div>
    </div>
  `;
  document.getElementById('heroTrack').appendChild(slide);
  const dot=document.createElement('div');
  dot.className='hero-dot'+(i===0?' active':'');
  dot.onclick=e=>{e.stopPropagation();goHero(i)};
  document.getElementById('heroIndicators').appendChild(dot);
});
function goHero(idx){
  heroIdx=idx;
  document.getElementById('heroTrack').style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.hero-dot').forEach((d,i)=>d.className='hero-dot'+(i===idx?' active':''));
}
function moveHero(dir){heroIdx=(heroIdx+dir+heroProjects.length)%heroProjects.length;goHero(heroIdx);}
const hw=document.querySelector('.hero-track-wrap');
hw.addEventListener('mouseenter',()=>clearInterval(heroTimer));
hw.addEventListener('mouseleave',startHeroAuto);
function startHeroAuto(){heroTimer=setInterval(()=>moveHero(1),4500)}
startHeroAuto();

function starStr(r){return '★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r))}

function makeSquareCard(p){
  const el=document.createElement('div');
  el.className='app-sq';
  el.onclick=()=>openDetail(p.id);
  el.innerHTML=`
    <div class="app-sq-icon">${p.icon}</div>
    <div class="app-sq-name">${p.name}</div>
    <div class="app-sq-rating"><span class="star">★</span>${p.rating}</div>
  `;
  return el;
}
function makeWideCard(p){
  const el=document.createElement('div');
  el.className='app-wide';
  el.onclick=()=>openDetail(p.id);
  el.innerHTML=`
    <div class="app-wide-img" style="background:${heroColors[PROJECTS.indexOf(p)%3]};color:#fff">${p.thumb}</div>

          <div class="rating"><span class="star">★</span>${p.rating} · ${p.reviews}</div>
        </div>
      </div>
    </div>
  `;
  return el;
}
function makePromoCard(p){
  const el=document.createElement('div');
  el.className='promo-card';
  el.onclick=()=>openDetail(p.id);
  const colors=['linear-gradient(135deg,#1a2e22,#0d4a2c)','linear-gradient(135deg,#0f1f3d,#1a3a6c)','linear-gradient(135deg,#2a1020,#5a1040)','linear-gradient(135deg,#1a1a0a,#4a3a00)'];
  el.innerHTML=`
    <div class="promo-card-bg" style="background:${colors[PROJECTS.indexOf(p)%4]};color:transparent">.</div>
    <div class="promo-card-overlay"></div>
    <div style="position:absolute;top:14px;left:14px;font-size:48px">${p.icon}</div>
    <button class="promo-card-btn" onclick="event.stopPropagation();openDetail('${p.id}')">Install</button>
    <div class="promo-card-content">
      <div class="promo-card-badge">Editor's choice · ${p.cat}</div>
      <div class="promo-card-name">${p.name}</div>
      <div class="promo-card-sub">${p.tagline.substring(0,50)}${p.tagline.length>50?'…':''}</div>
    </div>
  `;
  return el;
}
function fill(id,projects,type='wide'){
  const el=document.getElementById(id);
  if(!el)return;
  projects.forEach(p=>el.appendChild(type==='sq'?makeSquareCard(p):type==='promo'?makePromoCard(p):makeWideCard(p)));
}

const chartData = {
  free: PROJECTS.filter(p=>p.price==='Free').sort((a,b)=>b.rating-a.rating),

};

function switchChartTab(type,btn){
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  currentChart=type;
  renderCharts();
}
function renderCharts(){
  const list=document.getElementById('chartsList');
  const data=chartData[currentChart]||PROJECTS;
  list.innerHTML='';
  data.slice(0,8).forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='chart-row';
    row.onclick=()=>openDetail(p.id);
    row.innerHTML=`
      <div class="chart-rank">${i+1}</div>
      <div class="chart-icon">${p.icon}</div>
      <div class="chart-info">
        <div class="chart-name">${p.name}</div>
        <div class="chart-cat">${p.cat}</div>
        <div class="chart-rating"><span class="star">★</span>${p.rating}</div>
      </div>
      <button class="chart-btn${p.price!=='Free'?' price':''}" onclick="event.stopPropagation();openDetail('${p.id}')">${p.price==='Free'?'Install':p.price}</button>

}

function closeDetail(){
  document.getElementById('detailPage').classList.remove('open');
  document.getElementById('stickyCta').className='sticky-cta';
  document.body.style.overflow='';
}
function toggleSection(header){
  const next=header.nextElementSibling;
  const icon=header.querySelector('svg');
  const isOpen=next.style.display!=='none'&&next.style.display!=='';
  // default open
  if(!next.dataset.init){next.dataset.init='true';return;}
  next.style.display=isOpen?'none':'';
  icon.style.transform=isOpen?'rotate(-90deg)':'';
}

// ===== CHIP CLASS =====
function chipClass(t){
  const m={Flutter:'flutter',Firebase:'firebase',Python:'ai',TensorFlow:'ai',ResNet50:'ai',VGG16:'ai',Blockchain:'backend','Node.js':'backend',Research:'research','Realtime DB':'backend','Google Maps':'backend',GetX:'flutter',Riverpod:'flutter',Bloc:'flutter',Dart:'flutter'};
  return m[t]||'';
}

// ===== SEARCH =====
function openSearch(){
  document.getElementById('searchOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}
function closeSearch(){
  document.getElementById('searchOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function doSearch(q){
  const label=document.getElementById('searchLabel');
  const grid=document.getElementById('searchGrid');
  if(!q.trim()){label.textContent='';grid.innerHTML='';return;}
  const ql=q.toLowerCase();
  const m=PROJECTS.filter(p=>
    p.name.toLowerCase().includes(ql)||p.tagline.toLowerCase().includes(ql)||
    p.tags.some(t=>t.includes(ql))||p.tech.some(t=>t.toLowerCase().includes(ql))||
    p.cat.toLowerCase().includes(ql)||p.desc.toLowerCase().includes(ql)
  );
  label.textContent=m.length+' result'+(m.length!==1?'s':'')+' for "'+q+'"';
  grid.innerHTML='';
  if(!m.length){
    grid.innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div><p>No results for "'+q+'"</p><span>Try: flutter, AI, firebase, blockchain, research</span></div>';
    return;
  }
  m.forEach(p=>grid.appendChild(makeWideCard(p)));
}

// ===== CATEGORY FILTER =====
function filterCat(cat,tab){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  if(tab)tab.classList.add('active');

  const main=document.getElementById('mainContent');
  if(cat==='all'){
    main.innerHTML='';
    rebuildMain();
    return;
  }

  const matched=cat==='charts'
    ?PROJECTS
    :PROJECTS.filter(p=>p.tags.includes(cat)||p.category.includes(cat));

  main.innerHTML=`
    <div style="padding:24px">
      <p style="font-size:13px;color:var(--text3);margin-bottom:16px">${matched.length} apps</p>
      <div class="search-results-grid" style="padding:0" id="catGrid"></div>
    </div>
  `;
  const g=document.getElementById('catGrid');
  matched.forEach(p=>g.appendChild(makeWideCard(p)));
}

function sidebarNav(btn,cat){
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCat(cat,null);
}
